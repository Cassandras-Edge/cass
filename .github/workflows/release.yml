name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-amd64
          - os: windows-latest
            target: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .

      - name: Build binary
        # --copy-metadata includes cass's .dist-info so that importlib.metadata
        # can resolve the version inside the frozen binary. Without it,
        # CURRENT_VERSION falls back to "0.0.0-dev".
        run: pyinstaller --onefile --copy-metadata cass --name cass-${{ matrix.target }} --clean cass_entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cass-${{ matrix.target }}
          path: dist/cass-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
